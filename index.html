<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generador de Culto</title>

  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      height: 300px;
      overflow-y: auto;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px;
    }

    .song {
      background: #1e293b;
      padding: 10px;
      margin: 8px;
      border-radius: 10px;
      cursor: pointer;
    }

    .song.selected {
      background: #22c55e;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🎶 Generador de Culto</h1>

<!-- 🔐 PASSWORD -->
<input type="password" id="adminPass" placeholder="Contraseña admin" style="padding:10px; border-radius:10px; border:none;">

<input 
  type="text" 
  id="buscador" 
  placeholder="Buscar canción..." 
  oninput="filtrarCanciones()"
  style="padding:10px; width:80%; border-radius:10px; border:none; margin:10px;"
>

<br>

<select onchange="ordenarCanciones(this.value)" style="padding:10px; border-radius:10px;">
  <option value="default">Ordenar</option>
  <option value="az">A-Z</option>
  <option value="za">Z-A</option>
  <option value="numAsc">Número ↑</option>
  <option value="numDesc">Número ↓</option>
</select>

<div class="container" id="songList"></div>

<div style="position: sticky; bottom: 0; background: #0f172a; padding: 10px;">
  <button onclick="generarPPT()">Generar</button>
  <button onclick="preview()">Preview</button>
  <button onclick="limpiarSeleccion()">Limpiar</button>
  <button onclick="mostrarEliminar()">Eliminar</button>
</div>

<div id="seleccionadasUI" style="margin:10px;"></div>
<div id="previewContainer" style="max-width:800px; margin:auto;"></div>

<!-- 🗑️ UI ELIMINAR -->
<div id="eliminarUI" style="display:none; margin:20px;"></div>

<hr>

<h3>Subir canción individual</h3>
<input type="file" id="fileInput">
<button onclick="subirArchivo()">Subir canción</button>

const plantilla = "data:image/jpeg;base64,/9j/";
const intermedio = "data:image/jpeg;base64,/9j/";

const cancionesLocales = [
  {
    titulo: "Dios de lo imposible",
    slides: [
      "DIOS DE LO IMPOSIBLE\nJesucristo, reinas con poder\nSoberano, victorioso rey\nNi la muerte pudo detener\nTu poder para vencer",
      "Dios de lo imposible\nTe adoramos\nEres invencible\nSoberano",
      "Tuya es toda la gloria\nTuyo es todo el honor"
    ]
  }
];

let canciones = [];
let cancionesFiltradas = [];
let seleccionadas = [];

// 🔥 FETCH ROBUSTO (SOLUCIONA RENDER)
async function cargarCancionesDesdeBackend() {
  try {
    let res = await fetch("/canciones");
    if (!res.ok) throw new Error("Backend error");
    return await res.json();
  } catch (err) {
    console.error("Error backend:", err);
    return [];
  }
}

async function iniciarApp() {
  seleccionadas = [];
  document.getElementById("buscador").value = "";

  const data = await cargarCancionesDesdeBackend();

  canciones = [...cancionesLocales, ...data];
  cancionesFiltradas = [...canciones];

  mostrarCanciones();
}

function mostrarCanciones() {
  const contenedor = document.getElementById("songList");
  contenedor.innerHTML = "";

  cancionesFiltradas.forEach(c => {
    const div = document.createElement("div");
    div.classList.add("song");
    div.innerText = c.titulo;

    const realIndex = canciones.indexOf(c);

    if (seleccionadas.includes(realIndex)) {
      div.classList.add("selected");
    }

    div.onclick = () => {
      if (seleccionadas.includes(realIndex)) {
        seleccionadas = seleccionadas.filter(i => i !== realIndex);
      } else {
        seleccionadas.push(realIndex);
      }

      actualizarSeleccionUI();
      mostrarCanciones();
    };

    contenedor.appendChild(div);
  });
}

function actualizarSeleccionUI() {
  const cont = document.getElementById("seleccionadasUI");

  cont.innerHTML = seleccionadas.length === 0
    ? "No hay canciones seleccionadas"
    : seleccionadas.map(i => canciones[i]?.titulo).join(" ➜ ");
}

function limpiarSeleccion() {
  seleccionadas = [];
  actualizarSeleccionUI();
  mostrarCanciones();
}

function filtrarCanciones() {
  let texto = document.getElementById("buscador").value.toLowerCase();
  cancionesFiltradas = canciones.filter(c => c.titulo.toLowerCase().includes(texto));
  mostrarCanciones();
}

function ordenarCanciones(tipo) {
  let copia = [...cancionesFiltradas];

  if (tipo === "az") copia.sort((a,b)=>a.titulo.localeCompare(b.titulo));
  if (tipo === "za") copia.sort((a,b)=>b.titulo.localeCompare(a.titulo));
  if (tipo === "numAsc") copia.sort((a,b)=>extraerNumero(a.titulo)-extraerNumero(b.titulo));
  if (tipo === "numDesc") copia.sort((a,b)=>extraerNumero(b.titulo)-extraerNumero(a.titulo));

  cancionesFiltradas = copia;
  mostrarCanciones();
}

function extraerNumero(texto) {
  let m = texto.match(/\d+/);
  return m ? parseInt(m[0]) : 9999;
}

// 🔥 SUBIR CON PASSWORD + REEMPLAZO
async function subirArchivo() {

  let password = document.getElementById("adminPass").value;
  if (!password) return alert("Ingresa contraseña");

  let file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Selecciona archivo");

  const existe = canciones.some(c => c.titulo.toLowerCase() === file.name.toLowerCase());

  let replace = false;
  if (existe) {
    replace = confirm("Ya existe ¿Reemplazar?");
  }

  let formData = new FormData();
  formData.append("archivo", file);
  formData.append("password", password);
  formData.append("replace", replace);

  let res = await fetch("/upload", { method:"POST", body:formData });
  let data = await res.json();

  if (!res.ok) return alert(data.error);

  alert("Proceso completado");
  iniciarApp();
}

// 🔥 ELIMINAR
function mostrarEliminar() {

  const cont = document.getElementById("eliminarUI");

  // 🔁 TOGGLE (mostrar / ocultar)
  if (cont.style.display === "block") {
    cont.style.display = "none";
    cont.innerHTML = "";
    return;
  }

  cont.style.display = "block";

  cont.innerHTML = `
    <input 
      type="text" 
      id="buscadorEliminar" 
      placeholder="Buscar canción a eliminar..."
      oninput="filtrarEliminar()"
      style="padding:10px; width:80%; border-radius:10px; border:none; margin:10px;"
    >
    <div id="listaEliminar"></div>
  `;
}
function filtrarEliminar() {

  const texto = document.getElementById("buscadorEliminar").value.toLowerCase();
  const lista = document.getElementById("listaEliminar");

  const filtradas = canciones.filter(c => 
    c.titulo.toLowerCase().includes(texto)
  );

  if (filtradas.length === 0) {
    lista.innerHTML = "<p>No se encontraron canciones</p>";
    return;
  }

  lista.innerHTML = filtradas.map(c => `
    <div style="
      background:#1e293b;
      margin:5px;
      padding:10px;
      border-radius:10px;
    ">
      ${c.titulo}
      <button onclick="eliminarCancion(${c.id})">Eliminar</button>
    </div>
  `).join("");
}

async function eliminarCancion(id) {

  let password = document.getElementById("adminPass").value;
  if (!password) return alert("Ingresa contraseña");

  let ok = confirm("¿Eliminar?");
  if (!ok) return;

  let res = await fetch("/eliminar/" + id, {
    method:"DELETE",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ password })
  });

  let data = await res.json();

  if (!res.ok) return alert(data.error);

  alert("Eliminado");
  iniciarApp();
}

// 🔥 PPT (CONSTANTIA FORZADA)
function generarPPT() {
  let pptx = new PptxGenJS();
  pptx.defineLayout({ name:"CUSTOM", width:20, height:11.25 });
  pptx.layout="CUSTOM";

  let inicio = pptx.addSlide();
  inicio.addImage({ data:intermedio,x:0,y:0,w:20,h:11.25 });

  seleccionadas.map(i => canciones[i]).forEach(c => {

    c.slides.forEach((texto,index)=>{

      let slide = pptx.addSlide();
      slide.addImage({ data:plantilla,x:0,y:0,w:20,h:11.25 });

      let lineas = texto.split("\n");

      if(index===0){
        slide.addText([
          {text:lineas[0]+"\n",options:{fontFace:"Constantia",fontSize:60,bold:true,italic:true,color:"D33D05",align:"center"}},
          {text:lineas.slice(1).join("\n"),options:{fontFace:"Constantia",fontSize:88,color:"632423",align:"center"}}
        ],{x:2,y:2,w:16,h:7,align:"center"});
      } else {
        slide.addText(texto,{
          x:2,y:2,w:16,h:7,
          align:"center",
          fontFace:"Constantia",
          fontSize:88,
          color:"632423"
        });
      }

    });

    let inter = pptx.addSlide();
    inter.addImage({ data:intermedio,x:0,y:0,w:20,h:11.25 });

  });

  pptx.writeFile({ fileName:"culto.pptx" });
}

iniciarApp();
